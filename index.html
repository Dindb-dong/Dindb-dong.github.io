<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="김동욱의 웹 데스크톱 포트폴리오. 프로젝트, 경험, 소개를 OS처럼 탐색합니다."
    />
    <title>DindbOS | Kim Dong Wook Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/static/woff2/SUIT.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="boot-screen" id="bootScreen" aria-hidden="true">
      <div class="boot-mark">DindbOS</div>
      <div class="boot-copy">legacy archive mounting...</div>
    </div>

    <main class="os-shell" id="app" aria-label="DindbOS portfolio desktop">
      <header class="top-bar" aria-label="System bar">
        <button class="system-button" id="launcherButton" type="button">
          DindbOS
        </button>
        <nav class="task-strip" id="taskStrip" aria-label="Open windows"></nav>
        <div class="system-status" id="systemStatus">Mounting legacy</div>
        <time class="clock" id="clock"></time>
      </header>

      <section class="desktop" id="desktop" aria-label="Desktop icons"></section>

      <aside class="dock" aria-label="Pinned applications">
        <button class="dock-item" type="button" data-app="about">About</button>
        <button class="dock-item" type="button" data-app="projects">Projects</button>
        <button class="dock-item" type="button" data-app="browser">Browser</button>
        <button class="dock-item" type="button" data-app="terminal">Terminal</button>
      </aside>

      <div class="window-layer" id="windowLayer" aria-live="polite"></div>

      <menu class="context-menu" id="contextMenu" type="context">
        <button type="button" data-command="open-projects">Open Projects</button>
        <button type="button" data-command="open-browser">Open Browser</button>
        <button type="button" data-command="open-presentations">Open Presentations</button>
        <button type="button" data-command="new-terminal">New Terminal</button>
        <button type="button" data-command="arrange-icons">Arrange icons</button>
        <button type="button" data-command="about-shell">About DindbOS</button>
      </menu>
    </main>

    <noscript>
      <p class="noscript-message">
        이 포트폴리오는 브라우저 안에서 작동하는 데스크톱 UI입니다.
        JavaScript를 켜야 프로젝트와 창을 열 수 있습니다.
      </p>
    </noscript>

    <script src="./app.js" defer></script>
  </body>
</html>
